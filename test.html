<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8"/>
<title>EduForge AI - Test</title>
</head>
<body>
<h1>EduForge AI - Test Page</h1>
<button onclick="testAPI()">اختبار API</button>
<div id="result"></div>
<script>
async function testAPI() {
  const result = document.getElementById('result');
  result.innerHTML = 'جاري الاختبار...';
  
  try {
    const url = '/api/generate-content?title=رياضيات&category=standard';
    const res = await fetch(url);
    const data = await res.json();
    result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
  } catch (e) {
    result.innerHTML = 'خطأ: ' + e.message;
  }
}
</script>
</body>
</html>
